name: Pre-Commit

on:
  pull_request:
    branches:
      - main
    paths:
      - ".pre-commit-config.yaml"
      - ".upptimerc.yml"
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    uses: kupecloud/github-workflows/.github/workflows/pre-commit.yaml@689a05f5764fb1960bb7e127b27987acc9129dd4 # v1.12.1
