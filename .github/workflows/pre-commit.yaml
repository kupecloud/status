name: Pre-Commit

on:
  pull_request:
    branches:
      - main
    paths:
      - ".pre-commit-config.yaml"
      - ".upptimerc.yml"
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    uses: kupecloud/github-workflows/.github/workflows/pre-commit.yaml@11b5503fe90f8de8fa6c7ceb32ef693f32524722 # v1.0.0
