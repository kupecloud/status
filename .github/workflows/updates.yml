name: Updates CI
# NOTE (kupe, review LOW-1): `upptime/updates` is now an upstream no-op stub
# (it only validates a token and logs "OK"), so this workflow performs no
# version bumps. The daily `schedule:` trigger was removed so it no longer
# runs a misleading green no-op. Upptime version bumps are done manually via
# the Update Template CI workflow (update-template.yml). Retained because
# Upptime regenerates it on template updates.
on:
  repository_dispatch:
    types: [updates]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    name: Deploy updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Update code
        uses: upptime/updates@c8be3a2281e37dfb3211b7cd8f847b014e551634 # master (untagged, ahead of v1.0.1)
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
