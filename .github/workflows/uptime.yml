name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
permissions:
  contents: write
  # issues: write lets upptime open/close incident issues and call
  # issues.listForRepo (maintenance events) with the default GITHUB_TOKEN.
  # The complete fix (Setup CI template push, assignees) still needs a
  # fine-grained GH_PAT secret — see docs/incident-issues.md operator note.
  issues: write
jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check endpoint status
        uses: upptime/uptime-monitor@84b1dd9346adc6e6a02bdddf0e3bfc7274013ece # v1.43.7
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
