owner: kupecloud
repo: status

i18n:
  footer: ""

sites:
  # - name: Console
  #   url: https://console.kupe.cloud
  # - name: Auth
  #   url: https://auth.kupe.cloud
  # - name: Grafana
  #   url: https://grafana.kupe.cloud
  - name: Website
    url: https://kupe.cloud

status-website:
  cname: status.kupe.cloud
  logoUrl: https://status.kupe.cloud/kupe-logo-light.png
  favicon: https://status.kupe.cloud/favicon.png
  name: Kupe Status
  theme: dark
  introTitle: "**Kupe Status** — real-time monitoring of Kupe services."
  introMessage: This page shows the current status of Kupe's public services. If you're experiencing issues, check here for updates. Incidents are tracked via [GitHub Issues](https://github.com/kupecloud/status/issues).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  css: |
    @font-face {
      font-family: "Atkinson Hyperlegible";
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url("/fonts/AtkinsonHyperlegibleNext-Light.woff2") format("woff2");
    }

    @font-face {
      font-family: "Atkinson Hyperlegible";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url("/fonts/AtkinsonHyperlegibleNext-Regular.woff2") format("woff2");
    }

    @font-face {
      font-family: "Atkinson Hyperlegible";
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url("/fonts/AtkinsonHyperlegibleNext-Bold.woff2") format("woff2");
    }

    :root {
      --body-background-color: #0d1218;
      --body-text-color: #e6edf3;
      --card-background-color: rgba(24, 32, 42, 0.92);
      --card-border-color: rgba(148, 163, 184, 0.18);
      --nav-background-color: #303a47;
      --nav-border-bottom-color: rgba(42, 157, 143, 0.18);
      --nav-current-border-bottom-color: #2a9d8f;
      --card-button-background-color: #2a9d8f;
      --card-button-border-color: #2a9d8f;
      --card-button-text-color: #081017;
      --card-button-background-color-hover: #35b6a7;
      --card-button-border-color-hover: #35b6a7;
      --card-button-text-color-hover: #ffffff;
      --down-border-left-color: #f16f6f;
      --down-background-color: rgba(241, 111, 111, 0.12);
      --degraded-border-left-color: #f3b562;
      --up-border-left-color: #4bbf8a;
      --tag-color: #eef4f6;
      --tag-up-background-color: rgba(75, 191, 138, 0.18);
      --tag-down-background-color: rgba(241, 111, 111, 0.16);
      --tag-degraded-background-color: rgba(243, 181, 98, 0.16);
      --change-background-color: rgba(109, 30, 245, 0.08);
      --error-button-border-color: rgba(241, 111, 111, 0.45);
      --error-button-background-color: rgba(241, 111, 111, 0.14);
      --error-button-color: #ffc0c0;
      --submit-button-background-color: #2a9d8f;
      --submit-button-border-color: #2a9d8f;
      --submit-button-color: #081017;
      --graph-opacity: 0.85;
      --graph-filter: saturate(0.92) brightness(0.9);
      --code-color: #e6edf3;
      --code-background-color: rgba(24, 32, 42, 0.92);
    }

    body {
      background:
        radial-gradient(circle at top, rgba(42, 157, 143, 0.1), transparent 30%),
        radial-gradient(circle at 100% 0%, rgba(109, 30, 245, 0.06), transparent 24%),
        linear-gradient(180deg, #0a0f14 0%, #0d1218 50%, #111821 100%);
      color: var(--body-text-color);
    }

    a {
      color: #79d1c8;
    }

    a:hover {
      color: #a4e5df;
    }

    nav {
      background: linear-gradient(135deg, #2d3744 0%, #3d4958 100%) !important;
      box-shadow: 0 12px 32px rgba(3, 10, 20, 0.35);
    }

    nav .container {
      align-items: center;
      display: grid;
      gap: 0.75rem;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    nav a.logo {
      align-items: center;
      display: inline-flex !important;
      gap: 0.75rem;
      justify-self: start;
      min-width: 0;
      text-decoration: none;
    }

    nav a.logo img {
      height: 3.25rem;
      width: auto;
    }

    nav ul {
      align-items: center;
      display: inline-flex;
      gap: 0.85rem;
      justify-self: end;
      list-style: none;
      margin: 0;
      padding: 0;
      white-space: nowrap;
    }

    nav li {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav ul a {
      font-size: 0.95rem;
      line-height: 1.2;
      padding: 0.2rem 0;
    }

    nav a,
    nav div {
      color: #f1f5f9 !important;
    }

    nav a.logo div {
      align-items: baseline;
      color: transparent !important;
      display: inline-flex;
      font-family: "Atkinson Hyperlegible", sans-serif;
      font-size: 0;
      gap: 0.35rem;
      line-height: 1.2;
      white-space: nowrap;
    }

    nav a.logo div::before,
    nav a.logo div::after {
      color: #f1f5f9;
      font-size: 1.5rem;
      letter-spacing: 0.015em;
      line-height: 1.2;
    }

    nav a.logo div::before {
      content: "Kupe";
      font-weight: 700;
    }

    nav a.logo div::after {
      content: "Status";
      font-weight: 300;
    }

    @media (min-width: 48rem) {
      nav a.logo div::before,
      nav a.logo div::after {
        font-size: 1.75rem;
      }
    }

    @media (max-width: 47.99rem) {
      nav .container {
        gap: 0.5rem;
        grid-template-columns: minmax(0, 1fr) auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }

      nav a.logo {
        gap: 0.45rem;
        margin-left: -0.15rem;
      }

      nav a.logo img {
        height: 2.5rem;
      }

      nav a.logo div {
        gap: 0.12rem;
      }

      nav a.logo div::before,
      nav a.logo div::after {
        font-size: 1.15rem;
        letter-spacing: 0.02em;
      }

      nav ul {
        gap: 0.6rem;
      }

      nav ul a {
        font-size: 0.9rem;
      }
    }

    [aria-current] {
      border-bottom-color: #2a9d8f !important;
    }

    main > header {
      background: linear-gradient(160deg, #202935 0%, #33404f 58%, #445667 100%);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 1rem;
      box-shadow: 0 18px 40px rgba(4, 13, 24, 0.22);
      color: #f8fafc;
      margin-top: 1.5rem;
      padding: 1.5rem 1.75rem;
    }

    main > header a,
    main > header p,
    main > header strong,
    main > header h1 {
      color: inherit !important;
    }

    .lead,
    h3,
    small {
      color: #98a6b5 !important;
    }

    article {
      background: rgba(24, 32, 42, 0.92);
      border-color: rgba(148, 163, 184, 0.18);
      box-shadow: 0 18px 40px rgba(4, 13, 24, 0.22);
    }

    .tag {
      border-radius: 999px;
      padding: 0.33rem 0.65rem;
    }

    .tag.closed,
    .tag.up {
      color: #8be0b6;
    }

    .tag.open,
    .tag.down {
      color: #ffc0c0;
    }

    .tag.degraded {
      color: #ffd493;
    }

    .submit-button,
    a.error-button {
      border-radius: 999px;
    }

# See https://upptime.js.org/docs/configuration for more options
