owner: kupe
repo: status

sites:
  # - name: Console
  #   url: https://console.kupe.cloud
  # - name: Auth
  #   url: https://auth.kupe.cloud
  # - name: Grafana
  #   url: https://grafana.kupe.cloud
  - name: Website
    url: https://kupe.cloud

status-website:
  cname: status.kupe.cloud
  logoUrl: https://kupe.cloud/logo.svg
  favicon: https://kupe.cloud/favicon.ico
  name: Kupe Status
  theme: dark
  introTitle: "**Kupe Status** — real-time monitoring of Kupe services."
  introMessage: This page shows the current status of Kupe's public services. If you're experiencing issues, check here for updates. Incidents are tracked via [GitHub Issues](https://github.com/kupe/status/issues).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  css: |
    :root {
      --color-text: #f5f5f5;
      --color-background: #1a1a2e;
      --color-accent: #0eb9ab;
      --color-accent-hover: #078980;
      --color-success: #0eb9ab;
      --color-error: #e74c3c;
      --color-warning: #f39c12;
      --color-link: #0eb9ab;
      --color-link-hover: #078980;
    }
    body {
      background-color: #1a1a2e;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .navbar {
      background-color: #12121f;
      border-bottom: 1px solid #2a2a4a;
    }
    .btn-primary, .btn.btn-sm {
      background-color: #0eb9ab;
      border-color: #0eb9ab;
      color: #fff;
    }
    .btn-primary:hover, .btn.btn-sm:hover {
      background-color: #078980;
      border-color: #078980;
    }
    a {
      color: #0eb9ab;
    }
    a:hover {
      color: #078980;
    }
    .badge-success, .tag.is-success {
      background-color: #0eb9ab;
    }
    .badge-danger, .tag.is-danger {
      background-color: #e74c3c;
    }

# See https://upptime.js.org/docs/configuration for more options
